<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="code.js"></script>
    <title>ראשי פרקיפ</title>
</head>
<body>
        <!-- מסגרת האייפון -->
        <div class="phone">

            <!-- תוכן המסך -->
            <div class="screen">
    
                <!-- לוגו -->
                <img src="media/logo.png" class="logo">
    
                <!-- אייקונים -->
                <div class="top-icons">
                    <img src="media/icons/settingsIcon.svg">
                    <img src="media/icons/categoriesIcon.svg">
                </div>
    
                <!-- כותרת -->
                <h2 class="categories-subtitle">אפליקציית תל"ב בכף היד</h2>
    

                <p class="page-description">
                    לחצו על אחד מהנושאים כדי להתחיל ללמוד
                </p>
                
                <div class="categories-container">
                
                    <div class="category-card">
                        <img src="media/strugglingCamperPic.jpg">
                        <p>טיפול בחניך מתקשה</p>
                    </div>
                
                    <div class="category-card">
                        <img src="media/committeePic.jpg">
                        <p>ועדה להערכת חניך</p>
                    </div>
                
                    <div class="category-card">
                        <img src="media/excellentCamperPic.jpg">
                        <p>בחירת חניך מצטיין וחניך למופת</p>
                    </div>
                
                    <div class="category-card">
                        <img src="media/personalBagPic.jpg">
                        <p>תיק אישי לחניך</p>
                    </div>

                    <div class="category-card center-card">
                        <img src="media/unitTransitionPic.jpg">
                        <p>העברת בוגר קורס ליחידה קולטת</p>
                    </div>
                
                </div>
    
    
            </div>
            <p class="footer-text">
                פותח ע"י רב"ט נוגה בר-לב
            </p>
    
        </div>
</body>
</html>
